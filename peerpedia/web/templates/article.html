<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — PeerPedia</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <header>
        <h1>📚 PeerPedia</h1>
        <nav>
            <a href="/">首页</a>
            <a href="/submit">提交</a>
            <a href="/review">审稿队列</a>
        </nav>
    </header>

    <main>
        {% if article %}
        <article class="article-view">
            <h1>{{ article.title }}</h1>
            <div class="article-meta">
                <span>作者: {{ article.founding_authors | join(", ") }}</span>
                <span>版本: {{ article.version }}</span>
                <span>状态: {{ article.status }}</span>
            </div>
            <div class="article-abstract">
                <h2>摘要</h2>
                <p>{{ article.abstract }}</p>
            </div>
            <div class="article-content" id="article-content"
                 hx-get="/api/v1/articles/{{ article.id }}/compile?fmt=html"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <p>编译中...</p>
            </div>
            <aside class="reference-graph">
                <h3>📚 References</h3>
                <!-- Reference DAG -->
            </aside>
        </article>
        {% else %}
        <p class="empty-state">文章未找到。</p>
        {% endif %}
    </main>
</body>
</html>
