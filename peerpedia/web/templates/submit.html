<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} — PeerPedia</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <header>
        <h1>📚 PeerPedia</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/review">Review Queue</a>
        </nav>
    </header>

    <main>
        <h2>Submit Article</h2>
        <form action="/api/v1/articles" method="post" enctype="multipart/form-data">
            <label>Title: <input type="text" name="title" required></label>
            <label>Format:
                <select name="format">
                    <option value="typst">Typst</option>
                    <option value="markdown">Markdown + KaTeX</option>
                </select>
            </label>
            <label>Abstract: <textarea name="abstract" rows="4"></textarea></label>
            <label>Categories: <input type="text" name="categories" placeholder="math, physics"></label>
            <label>Keywords: <input type="text" name="keywords"></label>
            <label>Language:
                <select name="language">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                    <option value="bilingual">Bilingual</option>
                </select>
            </label>
            <label>File: <input type="file" name="article_file" accept=".typ,.md"></label>
            <button type="submit">Submit for Review</button>
        </form>
    </main>
</body>
</html>
