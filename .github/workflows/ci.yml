name: CI — PR Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Backend (Python)
  # ═══════════════════════════════════════════════════════════════════

  backend-test:
    name: Backend — pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: |
          pip install -e core/
          pip install -e "backend/[dev]"
      - name: Seed
        run: python seed.py
      - name: Test
        run: python -m pytest backend/tests/ -v --tb=short --durations=10

  backend-lint:
    name: Backend — ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # ruff not fully configured yet
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check backend/ core/ seed.py

  backend-types:
    name: Backend — mypy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # mypy not configured yet — don't block
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: pip install mypy && pip install -e core/ && pip install -e backend/
      - name: Type check
        run: mypy backend/peerpedia_api/ core/peerpedia_core/ --ignore-missing-imports || echo "⚠️ mypy not clean yet"

  # ═══════════════════════════════════════════════════════════════════
  # Frontend (TypeScript/Vue)
  # ═══════════════════════════════════════════════════════════════════

  frontend-test:
    name: Frontend — vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Test
        working-directory: frontend
        run: npx vitest run --reporter=verbose

  frontend-types:
    name: Frontend — vue-tsc
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Type check
        working-directory: frontend
        run: npx vue-tsc --noEmit 2>&1 || echo "⚠️ vue-tsc not clean yet"

  frontend-lint:
    name: Frontend — eslint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # no eslint config yet — don't block
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npx eslint src/ --ext .ts,.vue 2>&1 || echo "⚠️ eslint not configured"

  # ═══════════════════════════════════════════════════════════════════
  # Rust (Tauri backend)
  # ═══════════════════════════════════════════════════════════════════

  rust-test:
    name: Rust — cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Tauri)
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: Test
        working-directory: frontend/src-tauri
        run: cargo test --verbose

  rust-clippy:
    name: Rust — clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - name: Clippy
        working-directory: frontend/src-tauri
        run: cargo clippy -- -D warnings

  rust-fmt:
    name: Rust — fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # cargo fmt may differ between versions
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        working-directory: frontend/src-tauri
        run: cargo fmt --check

  # ═══════════════════════════════════════════════════════════════════
  # Integration / Build smoke
  # ═══════════════════════════════════════════════════════════════════

  build-smoke:
    name: Build — vite verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend-test, backend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npx vite build

  # ═══════════════════════════════════════════════════════════════════
  # Final gate — all critical jobs must pass
  # ═══════════════════════════════════════════════════════════════════

  gate:
    name: 🚦 PR Gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs:
      - backend-test
      - backend-lint
      - frontend-test
      - frontend-types
      - rust-test
      - rust-clippy
      - rust-fmt
      - build-smoke
    if: always()
    steps:
      - name: Verdict
        env:
          BACKEND_TEST: ${{ needs.backend-test.result }}
          BACKEND_LINT: ${{ needs.backend-lint.result }}
          FRONTEND_TEST: ${{ needs.frontend-test.result }}
          FRONTEND_TYPES: ${{ needs.frontend-types.result }}
          RUST_TEST: ${{ needs.rust-test.result }}
          RUST_CLIPPY: ${{ needs.rust-clippy.result }}
          RUST_FMT: ${{ needs.rust-fmt.result }}
          BUILD_SMOKE: ${{ needs.build-smoke.result }}
        run: |
          FAILED=""
          # Jobs that are allowed to fail (continue-on-error, formatting warnings, etc.)
          NON_BLOCKING="BACKEND_LINT BACKEND_TYPES RUST_FMT FRONTEND_LINT FRONTEND_TYPES"
          for result in BACKEND_TEST:$BACKEND_TEST BACKEND_LINT:$BACKEND_LINT FRONTEND_TEST:$FRONTEND_TEST FRONTEND_TYPES:$FRONTEND_TYPES RUST_TEST:$RUST_TEST RUST_CLIPPY:$RUST_CLIPPY RUST_FMT:$RUST_FMT BUILD_SMOKE:$BUILD_SMOKE; do
            job="${result%%:*}"
            val="${result##*:}"
            if [ "$val" != "success" ] && [ "$val" != "skipped" ]; then
              if echo "$NON_BLOCKING" | grep -qw "$job"; then
                echo "⚠️  $job: $val (non-blocking)"
              else
                FAILED="$FAILED $job"
              fi
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "❌ BLOCKED — failed jobs:$FAILED"
            exit 1
          fi
          echo "✅ ALL GATES PASSED"
