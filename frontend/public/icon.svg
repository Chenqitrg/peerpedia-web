<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Lucide Waypoints icon, scaled 21x to ~500px, centered -->
  <g transform="translate(4, 4) scale(21)"
     stroke="#9db5c9" stroke-width="1.2" stroke-linecap="butt" stroke-linejoin="round">
    <!-- Diagonal connections -->
    <path d="m10.586 5.414-5.172 5.172"/>
    <path d="m18.586 13.414-5.172 5.172"/>
    <!-- Horizontal center line -->
    <path d="M6 12h12"/>
    <!-- Nodes (hollow circles, inheriting stroke + fill=none from group) -->
    <circle cx="12" cy="20" r="2.5"/>
    <circle cx="12" cy="4"  r="2.5"/>
    <circle cx="20" cy="12" r="2.5"/>
    <circle cx="4"  cy="12" r="2.5"/>
  </g>
</svg>
