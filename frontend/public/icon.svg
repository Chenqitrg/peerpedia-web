<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Lucide Waypoints icon, scaled 20x to 480x480, centered -->
  <g transform="translate(16, 16) scale(20)"
     stroke="#9db5c9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
     fill="none">
    <!-- Diagonal lines -->
    <path d="m10.586 5.414-5.172 5.172"/>
    <path d="m18.586 13.414-5.172 5.172"/>
    <!-- Horizontal center line -->
    <path d="M6 12h12"/>
    <!-- Nodes -->
    <circle cx="12" cy="20" r="2" fill="#9db5c9" stroke="none"/>
    <circle cx="12" cy="4"  r="2" fill="#9db5c9" stroke="none"/>
    <circle cx="20" cy="12" r="2" fill="#9db5c9" stroke="none"/>
    <circle cx="4"  cy="12" r="2" fill="#9db5c9" stroke="none"/>
  </g>
</svg>
